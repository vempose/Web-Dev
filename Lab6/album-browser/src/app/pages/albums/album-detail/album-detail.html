<section class="card">
  <div class="header-row">
    <h1>Album Details</h1>
    <button type="button" class="secondary-button" (click)="goBack()">
      Back to Albums
    </button>
  </div>

  @if (errorMessage(); as error) {
    <p class="error">{{ error }}</p>
  }

  @if (successMessage(); as success) {
    <p class="success">{{ success }}</p>
  }

  @if (isLoading()) {
    <p role="status">Loading album details…</p>
  } @else {
    @if (album()) {
      <div class="details-grid">
        <p><strong>ID:</strong> {{ album()?.id }}</p>
        <p><strong>User ID:</strong> {{ album()?.userId }}</p>
      </div>

      <form class="edit-form" (submit)="$event.preventDefault(); save()">
        <label for="album-title-input">Album title:</label>
        <input
          id="album-title-input"
          type="text"
          [formControl]="titleControl"
          class="text-input"
          placeholder="Enter album title"
        />

        <div class="actions">
          <button
            type="submit"
            class="primary-button"
            [disabled]="!canSave()"
          >
            {{ isSaving() ? 'Saving…' : 'Save' }}
          </button>

          <a [routerLink]="['/albums', album()?.id, 'photos']" class="secondary-link">
            View Photos
          </a>
        </div>
      </form>
    } @else {
      <p>Album not found.</p>
    }
  }
</section>
