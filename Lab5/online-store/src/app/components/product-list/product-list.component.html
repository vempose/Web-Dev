<main class="container">
  <div class="grid">
    @for (product of filteredProducts(); track product.id) {
      <app-product-card
        [product]="product"
        [categoryName]="categoryService.getCategoryNameById(product.categoryId)"
        (liked)="addLike($event)"
        (removed)="removeProduct($event)"
      />
    } @empty {
      <p>No products in this category</p>
    }
  </div>
</main>
